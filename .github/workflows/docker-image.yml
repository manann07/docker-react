name: Docker Image CI

on:
  push:
    branches:
      - master

  pull_request:
    branches:
      - master

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t manan/docker-react -f Dockerfile.dev .

      - name: Run Tests
        run: docker run -e CI=true manan/docker-react npm run test
